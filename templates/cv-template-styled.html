<!DOCTYPE html>
<html lang="{{LANG}}">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<!-- Full-bleed rendering: generate-pdf.mjs reads this meta tag and sets PDF
     margins to 0 so the header band reaches the physical page edges.
     All content spacing is handled by CSS padding below. -->
<meta name="pdf-margin" content="0">
<title>{{NAME}} — CV</title>
<style>
  /* =========================================================================
     STYLED CV TEMPLATE ("VaroEnergy design")
     Visual layer modeled on the manually designed PowerPoint CV:
     - light-blue curved header band with name, title, contact icons + photo
     - icon section headers, skill pills, blue bullet lead-ins
     - two-column knowledge table
     Text remains ATS-parseable: static system fonts, no ligatures, real text.
     Palette: #213D78 (dark navy), #027BB8 (accent blue),
              #E8F6FC (band/pill bg), #95D7F4 (light border), #494949 (body).
     ========================================================================= */

  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    /* ATS: disable fi/fl ligatures so PDF text extraction stays literal. */
    font-variant-ligatures: none;
    font-feature-settings: "liga" 0, "clig" 0, "dlig" 0;
  }

  html {
    -webkit-print-color-adjust: exact;
    print-color-adjust: exact;
  }

  body {
    /* Calibri look (reference deck): Carlito is metric-compatible on Linux. */
    font-family: 'Calibri', 'Carlito', 'Liberation Sans', 'Helvetica Neue', Arial, sans-serif;
    font-size: 11pt;
    line-height: 1.24;
    color: #494949;
    background: #ffffff;
  }

  a { color: inherit; text-decoration: none; }

  .page { width: 100%; max-width: {{PAGE_WIDTH}}; margin: 0 auto; }

  /* === HEADER BAND === */
  .band {
    position: relative;
    margin: 3mm 4mm 0;
    padding: 6.5mm 10mm;
    min-height: 42mm;
    background: linear-gradient(180deg, #F2FAFE 0%, #E8F6FC 100%);
    border-radius: 8mm;
  }

  .band h1 {
    font-size: 36pt;
    font-weight: 700;
    color: #213D78;
    letter-spacing: 0.01em;
    line-height: 1.05;
    margin-bottom: 2px;
  }

  .band .headline {
    font-size: 14pt;
    font-weight: 700;
    color: #213D78;
    margin-bottom: 8px;
  }

  .contact-grid {
    display: grid;
    grid-template-columns: 62mm 80mm;
    grid-row-gap: 6px;
    font-size: 10.5pt;
    color: #027BB8;
  }

  .contact-item { display: flex; align-items: center; gap: 8px; }
  .contact-item svg { width: 15px; height: 15px; flex: 0 0 15px; stroke: #027BB8; }
  .contact-item a[href^="http"], .contact-item a[href^="https"] { text-decoration: underline; }

  .cv-photo {
    position: absolute;
    top: 6.5mm;
    bottom: 6.5mm;
    right: 10mm;
    width: 31mm;
    height: auto;
    object-fit: cover;
    border-radius: 10px;
  }

  /* Small repeated band for page 2+ (insert manually with .page-break).
     Negative side margins cancel the .content padding so the band runs
     edge-to-edge when the snippet is inserted inside {{EXPERIENCE}}. */
  .mini-band {
    position: relative;
    padding: 5mm 10mm 4mm;
    min-height: 24mm;
    margin: 4mm -10mm 4mm;
    background: linear-gradient(180deg, #F2FAFE 0%, #E8F6FC 100%);
    border-radius: 8mm;
  }
  .mini-band h1 { font-size: 36pt; font-weight: 700; color: #213D78; line-height: 1.05; }
  .mini-band .headline { font-size: 14pt; font-weight: 700; color: #213D78; }

  .page-break { break-after: page; page-break-after: always; }

  /* === CONTENT === */
  .content { padding: 3mm 14mm 0; }

  .section { margin-bottom: 9px; }

  .sec-head {
    display: flex;
    align-items: center;
    gap: 9px;
    margin-bottom: 3px;
  }
  .sec-head svg { width: 20px; height: 20px; stroke: #213D78; flex: 0 0 17px; }
  .section-title {
    font-size: 14pt;
    font-weight: 700;
    color: #213D78;
    text-transform: uppercase;
  }
  .sec-rule {
    border: 0;
    border-top: 1.4px solid #213D78;
    margin: 0 0 7px 0;
  }

  .summary-text { text-align: justify; margin-bottom: 6px; }

  /* Skill pills */
  /* inline-block layout instead of flex: WeasyPrint (preview renderer)
     paints borders of blockified flex items twice, which showed as a
     double frame around each pill. inline-block renders one clean border
     in both WeasyPrint and Chromium. */
  .competencies-grid {
    text-align: center;
    padding: 2px 0;
  }
  .competency-tag {
    display: inline-block;
    border: 1pt solid #6FC0EA;
    border-radius: 7px;
    background: #E8F6FC;
    color: #027BB8;
    font-size: 10pt;
    padding: 2px 9px;
    margin: 2px 2px;
    white-space: nowrap;
  }

  /* Experience */
  .job { margin-bottom: 6px; }
  .job-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 2px;
  }
  .job-co { font-weight: 700; color: #213D78; font-size: 11pt; }
  .job-co .job-note { font-weight: 400; color: #494949; }
  .job-meta { font-weight: 700; color: #213D78; font-size: 11pt; white-space: nowrap; }

  ul.dash { list-style: none; }
  ul.dash li {
    position: relative;
    padding-left: 16px;
    margin-bottom: 2.5px;
    text-align: justify;
  }
  ul.dash li::before {
    content: "\2013";
    position: absolute;
    left: 0;
    color: #027BB8;
    font-weight: 700;
  }
  .lead { color: #027BB8; font-weight: 700; }

  /* Knowledge two-column table */
  .skill-row { display: flex; gap: 6mm; margin-bottom: 5px; }
  .skill-category { flex: 0 0 34mm; color: #027BB8; }
  .skill-list { flex: 1; text-align: justify; }

  /* Education / certifications */
  .edu { margin-bottom: 6px; }
  .edu-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
  }
  .edu-title { font-weight: 700; color: #213D78; font-size: 11pt; }
  .edu-title .edu-note { font-weight: 400; color: #494949; }
  .edu-year { font-weight: 700; color: #213D78; font-size: 11pt; white-space: nowrap; }

  .cert-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    gap: 12px;
    margin-bottom: 3px;
  }
  .cert-name { font-weight: 700; color: #213D78; font-size: 11pt; }
  .cert-name .cert-issuer { font-weight: 400; color: #494949; }
  .cert-year { font-weight: 700; color: #213D78; font-size: 11pt; }

  /* RTL support (Arabic) */
  html[lang="ar"] body { direction: rtl; font-family: 'Segoe UI', Tahoma, 'Noto Naskh Arabic', Arial, sans-serif; }
  html[lang="ar"] .cv-photo { right: auto; left: 0; border-radius: 0 0 22px 0; }
  html[lang="ar"] ul.dash li { padding-left: 0; padding-right: 14px; }
  html[lang="ar"] ul.dash li::before { left: auto; right: 0; }

  /* CJK fallback (Japanese) */
  html[lang="ja"] body {
    font-family: 'Calibri', 'Carlito', 'Hiragino Sans', 'Yu Gothic', 'Noto Sans CJK JP', 'Noto Sans JP', Meiryo, sans-serif;
  }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER BAND -->
  <div class="band">
    {{PHOTO}}
    <h1>{{NAME}}</h1>
    <div class="headline">{{TITLE}}</div>
    <div class="contact-grid">
      <div class="contact-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="#027BB8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
        <a href="tel:{{PHONE}}">{{PHONE}}</a>
      </div>
      <div class="contact-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="#027BB8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="4" width="20" height="16" rx="2"/><path d="M22 6 12 13 2 6"/></svg>
        <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
      </div>
      <div class="contact-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="#027BB8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>
        <span>{{LOCATION}}</span>
      </div>
      <div class="contact-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="#027BB8" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M16 8a6 6 0 0 1 6 6v7h-4v-7a2 2 0 0 0-4 0v7h-4v-7a6 6 0 0 1 6-6z"/><rect x="2" y="9" width="4" height="12"/><circle cx="4" cy="4" r="2"/></svg>
        <a href="{{LINKEDIN_URL}}">{{LINKEDIN_DISPLAY}}</a>
      </div>
    </div>
  </div>

  <div class="content">

    <!-- PROFILE & COMPETENCIES (merged, as in reference design) -->
    <div class="section">
      <div class="sec-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="#213D78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><path d="M14 2v6h6"/><path d="M16 13H8M16 17H8M10 9H8"/></svg>
        <span class="section-title">{{SECTION_SUMMARY}}</span>
      </div>
      <hr class="sec-rule">
      <div class="summary-text">{{SUMMARY_TEXT}}</div>
      <div class="competencies-grid">
        {{COMPETENCIES}}
      </div>
    </div>

    <!-- WORK EXPERIENCE -->
    <div class="section">
      <div class="sec-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="#213D78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
        <span class="section-title">{{SECTION_EXPERIENCE}}</span>
      </div>
      <hr class="sec-rule">
      {{EXPERIENCE}}
    </div>

    <!-- SKILLS / KNOWLEDGE -->
    <div class="section">
      <div class="sec-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="#213D78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 1 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 1 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33h.01a1.65 1.65 0 0 0 1-1.51V3a2 2 0 1 1 4 0v.09a1.65 1.65 0 0 0 1 1.51h.01a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82v.01a1.65 1.65 0 0 0 1.51 1H21a2 2 0 1 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        <span class="section-title">{{SECTION_SKILLS}}</span>
      </div>
      <hr class="sec-rule">
      {{SKILLS}}
    </div>

    <!-- EDUCATION -->
    <div class="section">
      <div class="sec-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="#213D78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M22 10 12 5 2 10l10 5 10-5z"/><path d="M6 12v5c3 3 9 3 12 0v-5"/></svg>
        <span class="section-title">{{SECTION_EDUCATION}}</span>
      </div>
      <hr class="sec-rule">
      {{EDUCATION}}
    </div>

    <!-- CERTIFICATIONS -->
    <div class="section">
      <div class="sec-head">
        <svg viewBox="0 0 24 24" fill="none" stroke="#213D78" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="6"/><path d="M15.79 13.88 17 23l-5-3-5 3 1.21-9.12"/></svg>
        <span class="section-title">{{SECTION_CERTIFICATIONS}}</span>
      </div>
      <hr class="sec-rule">
      {{CERTIFICATIONS}}
    </div>

  </div>
</div>
</body>
</html>
